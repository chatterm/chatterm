# Probes: cursor moves (CUP/CUU/CUD), erase (ED/EL), DECSET cursor visibility.
agent = "bash"
case = "cursor-erase"
command = ["/bin/bash", "--noprofile", "--norc"]
cols = 120
rows = 30
idle_ms_default = 400

[[step]]
kind = "send"
data = "printf '\\e[2J\\e[H\\e[5;10Hmoved\\e[2Aup\\e[1B\\e[?25l\\e[?25h'\r"

[[step]]
kind = "send"
data = "printf 'line1\\nline2\\e[1Apartial\\e[K\\n'\r"

[[step]]
kind = "wait_idle"
ms = 400
