# Probes: OSC 0/2 (title), OSC 8 (hyperlinks), OSC 7 (cwd), OSC 52 (clipboard).
agent = "bash"
case = "osc"
command = ["/bin/bash", "--noprofile", "--norc"]
cols = 120
rows = 30
idle_ms_default = 400

[[step]]
kind = "send"
data = "printf '\\e]0;window-title-0\\a\\e]2;window-title-2\\a'\r"

[[step]]
kind = "send"
data = "printf '\\e]8;;https://example.com/a\\aclickable\\e]8;;\\a\\n'\r"

[[step]]
kind = "send"
data = "printf '\\e]7;file:///tmp\\a'\r"

[[step]]
kind = "send"
data = "printf '\\e]52;c;aGVsbG8=\\a'\r"

[[step]]
kind = "wait_idle"
ms = 400
