# Probes: DECSET mouse tracking variants + focus events + bracketed paste.
# Agents that render a TUI usually enable 1002 + 1006 on startup and disable
# on exit, so this mirrors the shape you'll see in real captures.
agent = "bash"
case = "mouse"
command = ["/bin/bash", "--noprofile", "--norc"]
cols = 120
rows = 30
idle_ms_default = 300

[[step]]
kind = "send"
data = "printf '\\e[?1000h\\e[?1002h\\e[?1003h\\e[?1006h\\e[?1004h\\e[?2004h'\r"

[[step]]
kind = "wait_idle"
ms = 200

[[step]]
kind = "send"
data = "printf '\\e[?2004l\\e[?1004l\\e[?1006l\\e[?1003l\\e[?1002l\\e[?1000l'\r"

[[step]]
kind = "wait_idle"
ms = 300
