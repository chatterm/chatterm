# Probes: SGR colors (basic 8, 256, truecolor), text attrs, reset.
# `\\e` in TOML is two literal chars \ and e — bash's printf then interprets.
agent = "bash"
case = "sgr"
command = ["/bin/bash", "--noprofile", "--norc"]
cols = 120
rows = 30
idle_ms_default = 400

[[step]]
kind = "send"
data = "printf '\\e[31mred\\e[0m \\e[1;32mbold-green\\e[0m \\e[3;4;35mitalic-underline\\e[0m\\n'\r"

[[step]]
kind = "send"
data = "printf '\\e[38;5;208morange-256\\e[0m \\e[38;2;255;128;0mtruecolor\\e[0m\\n'\r"

[[step]]
kind = "send"
data = "printf '\\e[7mreverse\\e[0m \\e[9mstrike\\e[0m\\n'\r"

[[step]]
kind = "wait_idle"
ms = 400
