# Probes: DECSET 2004 (bracketed paste mode). Most readline-enabled programs
# enable this on startup; we coax bash's line editor by loading bash_profile.
agent = "bash"
case = "bracketed-paste"
command = ["/bin/bash", "-i"]
cols = 120
rows = 30
idle_ms_default = 500

[[step]]
# Triggering a re-paint of the prompt usually emits ?2004h on modern bash.
kind = "send"
data = "\r"

[[step]]
kind = "wait_idle"
ms = 500

[[step]]
kind = "send"
data = "exit\r"

[[step]]
kind = "wait_idle"
ms = 300
