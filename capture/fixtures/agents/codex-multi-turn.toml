# Codex multi-turn — 5 back-and-forth prompts without tools to stress the
# per-turn state machine (thinking ↔ idle ↔ thinking …). Bracketed-paste
# submit per codex-basic.

agent = "codex"
case = "multi-turn"
command = ["codex"]
cwd = "/tmp/chatterm-matrix/trusted"
cols = 140
rows = 40
idle_ms_default = 18000
timeout_ms = 600000

[[step]]
kind = "wait_idle"
ms = 6000

[[step]]
kind = "send"
data = "\r"

[[step]]
kind = "wait_idle"
ms = 5000

[[step]]
kind = "send"
data = "<ESC>[200~what does 'cache coherence' mean in one sentence?<ESC>[201~\r"

[[step]]
kind = "wait_idle"
ms = 40000

[[step]]
kind = "send"
data = "<ESC>[200~rewrite that at a 10-year-old's reading level.<ESC>[201~\r"

[[step]]
kind = "wait_idle"
ms = 40000

[[step]]
kind = "send"
data = "<ESC>[200~compare async/await with threads in two bullets.<ESC>[201~\r"

[[step]]
kind = "wait_idle"
ms = 40000

[[step]]
kind = "send"
data = "<ESC>[200~which fits an IO-heavy web server?<ESC>[201~\r"

[[step]]
kind = "wait_idle"
ms = 40000

[[step]]
kind = "send"
data = "<ESC>[200~summarize our chat in 3 bullets.<ESC>[201~\r"

[[step]]
kind = "wait_idle"
ms = 40000

[[step]]
kind = "send"
data = "/exit\r"

[[step]]
kind = "wait_idle"
ms = 4000
