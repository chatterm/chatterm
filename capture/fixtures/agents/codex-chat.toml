# Codex baseline chat — three varied prompts so we actually capture reply
# bodies, not just startup chrome. Uses bracketed-paste submit (see
# codex-basic.toml for the why). Each prompt deliberately avoids file or
# network ops so Codex doesn't stop at a permission dialog.

agent = "codex"
case = "chat"
command = ["codex"]
cwd = "/tmp/chatterm-matrix/trusted"
cols = 140
rows = 40
idle_ms_default = 15000
timeout_ms = 420000

[[step]]
kind = "wait_idle"
ms = 6000

# Ack trust dialog
[[step]]
kind = "send"
data = "\r"

[[step]]
kind = "wait_idle"
ms = 5000

# 1. definition
[[step]]
kind = "send"
data = "<ESC>[200~define 'critical section' in one sentence.<ESC>[201~\r"

[[step]]
kind = "wait_idle"
ms = 45000

# 2. compare
[[step]]
kind = "send"
data = "<ESC>[200~compare mutexes and semaphores in two bullets.<ESC>[201~\r"

[[step]]
kind = "wait_idle"
ms = 45000

# 3. follow-up
[[step]]
kind = "send"
data = "<ESC>[200~which of those two fits a producer-consumer pipeline? one sentence.<ESC>[201~\r"

[[step]]
kind = "wait_idle"
ms = 45000

[[step]]
kind = "send"
data = "/exit\r"

[[step]]
kind = "wait_idle"
ms = 4000
