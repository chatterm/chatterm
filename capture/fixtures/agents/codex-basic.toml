# First-contact fixture for Codex CLI (openai).
#
# We don't know its chrome markers yet, so this is wait_idle-only: send a
# prompt, wait for bytes to stop flowing, repeat. The raw.bin is the real
# deliverable — inspect it to learn codex's title protocol, ready markers,
# and permission dialog shape before tightening the fixture.

agent = "codex"
case = "basic"
command = ["codex"]
cwd = "/tmp/chatterm-capture-sandbox"
cols = 140
rows = 40
idle_ms_default = 8000
timeout_ms = 240000

# 1. Startup — drain banner. Codex shows a "Do you trust this directory?" prompt
#    on first run in any cwd; the default option (1. Yes) is already selected,
#    so pressing Enter accepts it.
[[step]]
kind = "wait_idle"
ms = 4000

[[step]]
kind = "send"
data = "\r"

[[step]]
kind = "wait_idle"
ms = 3000

# 2. Plain-text probe.
[[step]]
kind = "send"
data = "explain what a PTY is in one sentence\r"

[[step]]
kind = "wait_idle"
ms = 20000

# 3. Code-block probe.
[[step]]
kind = "send"
data = "write a 5-line python fizzbuzz\r"

[[step]]
kind = "wait_idle"
ms = 25000

# 4. File-touching (may trigger permission chrome).
[[step]]
kind = "send"
data = "create a file hello-codex.txt containing 'hi from codex'\r"

[[step]]
kind = "wait_idle"
ms = 30000

# 5. Try common exit commands. Order matters — try the friendly ones first,
#    then fall back to Ctrl-D (EOT). If none work, the recorder kills the
#    child after the final drain anyway.
[[step]]
kind = "send"
data = "/exit\r"

[[step]]
kind = "wait_idle"
ms = 2000

[[step]]
kind = "send"
data = "\u0004"

[[step]]
kind = "wait_idle"
ms = 2000
