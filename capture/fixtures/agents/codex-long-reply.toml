# Codex long-form reply — force output > 40 rows to exercise scrollback
# stitching through the Codex TUI. Bracketed-paste submit per codex-basic.

agent = "codex"
case = "long-reply"
command = ["codex"]
cwd = "/tmp/chatterm-matrix/trusted"
cols = 140
rows = 40
idle_ms_default = 15000
timeout_ms = 420000

[[step]]
kind = "wait_idle"
ms = 6000

[[step]]
kind = "send"
data = "\r"

[[step]]
kind = "wait_idle"
ms = 5000

[[step]]
kind = "send"
data = "<ESC>[200~write a 500-word technical comparison of SQL vs NoSQL. Cover: data model, scalability, consistency, query ergonomics, operational burden. Use section headers.<ESC>[201~\r"

[[step]]
kind = "wait_idle"
ms = 180000

[[step]]
kind = "send"
data = "/exit\r"

[[step]]
kind = "wait_idle"
ms = 4000
