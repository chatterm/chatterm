# Probes Kiro across the same three dimensions. Want to confirm the verb
# list ("write requires approval" / "shell requires approval" / ...) and
# whether network or destructive ops trigger the same chrome.

agent = "kiro"
case = "permission-matrix"
command = ["kiro-cli", "chat"]
cwd = "/tmp/chatterm-matrix/trusted"
cols = 140
rows = 40
idle_ms_default = 10000
timeout_ms = 600000

[[step]]
kind = "wait_idle"
ms = 5000

# (a) Out-of-cwd write.
[[step]]
kind = "send"
data = "write a file to /tmp/chatterm-matrix/outer/from-kiro.txt with content hi\r"

[[step]]
kind = "wait_idle"
ms = 45000

# Esc to close (Kiro's footer says "ESC to close | Tab to edit").
[[step]]
kind = "send"
data = "\u001B"

[[step]]
kind = "wait_idle"
ms = 8000

# (b) Network fetch.
[[step]]
kind = "send"
data = "fetch https://example.com/robots.txt and summarize it\r"

[[step]]
kind = "wait_idle"
ms = 60000

[[step]]
kind = "send"
data = "\u001B"

[[step]]
kind = "wait_idle"
ms = 5000

# (c) Destructive rm.
[[step]]
kind = "send"
data = "use shell to run: rm -rf /tmp/chatterm-matrix/nested\r"

[[step]]
kind = "wait_idle"
ms = 45000

[[step]]
kind = "send"
data = "\u001B"

[[step]]
kind = "wait_idle"
ms = 8000

[[step]]
kind = "send"
data = "/quit\r"

[[step]]
kind = "wait_idle"
ms = 3000

[[step]]
kind = "send"
data = "\u0004"

[[step]]
kind = "wait_idle"
ms = 2000
